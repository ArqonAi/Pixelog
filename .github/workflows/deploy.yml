name: Deploy Pixelog Frontend to GitHub Pages

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

permissions:
  contents: read
  pages: write
  id-token: write
  security-events: write
  
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  security-scan:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Run Trivy vulnerability scanner
      uses: aquasecurity/trivy-action@master
      with:
        scan-type: 'fs'
        scan-ref: '.'
        format: 'sarif'
        output: 'trivy-results.sarif'
        
    - name: Upload Trivy scan results
      uses: github/codeql-action/upload-sarif@v3
      if: always()
      with:
        sarif_file: 'trivy-results.sarif'

  build:
    runs-on: ubuntu-latest
    # The frontend build needs the security scan to complete first
    needs: security-scan
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    # Removed Setup Go and all Go build steps
    
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
        cache-dependency-path: frontend/package-lock.json
        
    - name: Install frontend dependencies
      working-directory: ./frontend
      run: npm ci

    - name: Build frontend
      working-directory: ./frontend
      # Using 'npm run build' is often sufficient
      run: npm run build
      env:
        NODE_ENV: production
        
    - name: Create deployment package
      run: |
        # This copies the static build output (HTML/CSS/JS) to the 'deploy' folder
        mkdir -p deploy
        if [ -d "frontend/dist" ]; then
          cp -r frontend/dist/* deploy/
          echo "Frontend assets copied to deploy/."
        else
          echo "::error::Frontend build directory 'frontend/dist' not found. Cannot deploy."
          exit 1 # Fail the job if the build output is missing
        fi
        
    - name: Upload Pages artifact
      uses: actions/upload-pages-artifact@v3
      with:
        path: ./deploy

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    # Only deploy when pushing directly to 'main'
    if: github.ref == 'refs/heads/main'
    
    steps:
    - name: Deploy to GitHub Pages
      id: deployment
      uses: actions/deploy-pages@v4
